<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Decorative tree background">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f8f52"/>
      <stop offset="1" stop-color="#8ccf7a"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a5a3a"/>
      <stop offset="1" stop-color="#b48b60"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- Soft ground haze -->
  <ellipse cx="520" cy="640" rx="300" ry="60" fill="#cbeab5" opacity="0.45" filter="url(#soft)"/>

  <!-- Trunk -->
  <path d="M470 650c14-80 16-140 8-210-2-18 10-32 30-34 22-3 36 12 34 34-6 70-6 134 8 210z"
        fill="url(#trunk)" opacity="0.9"/>

  <!-- Main canopy blobs -->
  <g opacity="0.95">
    <circle cx="520" cy="240" r="150" fill="url(#leaf)"/>
    <circle cx="410" cy="280" r="120" fill="url(#leaf)"/>
    <circle cx="640" cy="290" r="120" fill="url(#leaf)"/>
    <circle cx="520" cy="360" r="140" fill="url(#leaf)"/>
    <circle cx="420" cy="390" r="110" fill="url(#leaf)"/>
    <circle cx="630" cy="400" r="110" fill="url(#leaf)"/>
  </g>

  <!-- Highlight leaves -->
  <g opacity="0.35">
    <circle cx="470" cy="220" r="55" fill="#cbeab5"/>
    <circle cx="610" cy="300" r="45" fill="#cbeab5"/>
    <circle cx="450" cy="380" r="50" fill="#cbeab5"/>
  </g>
</svg>

