<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agrotek</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a class="logo" href="index.html" aria-label="Agrotek home">
                    <img class="brand-logo" src="assets/agrotek-logo.svg" alt="Agrotek logo" />
                    <span class="brand-name">Agrotek</span>
                </a>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="solutions.html">Solutions</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="chatbot.html">AI Assistant</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1 data-i18n="nav_dashboard">Dashboard</h1>
            <p id="welcomeText">Loading your profile…</p>
        </div>
    </section>

    <section class="features-preview">
        <div class="container">
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">👤</div>
                    <h3>Account</h3>
                    <p id="accountInfo">—</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔔</div>
                    <h3>Notifications</h3>
                    <p><a href="notifications.html">Open notifications</a></p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🛒</div>
                    <h3>Marketplace</h3>
                    <p><a href="marketplace.html">Browse / Create listings</a></p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">⚙️</div>
                    <h3>Preferences</h3>
                    <form id="prefsForm">
                        <label style="display:block; margin: 8px 0;">
                            <input type="checkbox" id="prefInApp" checked />
                            In-app notifications
                        </label>
                        <label style="display:block; margin: 8px 0;">
                            <input type="checkbox" id="prefEmail" />
                            Email (stub)
                        </label>
                        <label style="display:block; margin: 8px 0;">
                            <input type="checkbox" id="prefSms" />
                            SMS/WhatsApp (stub)
                        </label>
                        <button class="btn btn-primary" type="submit">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Agrotek. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="app.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
